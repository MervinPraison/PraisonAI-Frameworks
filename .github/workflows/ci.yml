name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        extra: ["", "crewai", "autogen", "langgraph", "openai-agents", "agno", "google-adk"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: MervinPraison/PraisonAI
          ref: main
          path: praisonai-package
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e praisonai-package/src/praisonai-agents
          pip install -e ".[dev]"
          if [ -n "${{ matrix.extra }}" ]; then
            pip install -e ".[${{ matrix.extra }}]"
          fi
      - name: Run unit tests
        run: pytest tests/unit -q
      - name: Run integration tests
        if: matrix.extra != ''
        run: |
          dir="tests/integration/${{ matrix.extra == 'langgraph' && 'langgraph_adapter' || matrix.extra == 'openai-agents' && 'openai_agents_adapter' || matrix.extra == 'agno' && 'agno_adapter' || matrix.extra == 'google-adk' && 'google_adk_adapter' || matrix.extra }}"
          if [ ! -d "$dir" ]; then
            echo "No integration tests for ${{ matrix.extra }} yet — skipping"
            exit 0
          fi
          pytest "$dir" -q
